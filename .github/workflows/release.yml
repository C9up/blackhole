# Per-repo npm release for @c9up/blackhole (Model B — independent repo).
#
# ⚠ TEMPLATE — validate on CI before relying on it. Reference for the other
# native packages: change only `CRATE` + `LIBBASE` + the assembled `.node` name(s).
#
# PREREQUISITES (Model B):
#   1. Repo secret NPM_TOKEN (npm automation token, publish rights on @c9up).
#   2. Every @c9up package this one IMPORTS in src/ (here: @c9up/ream) must be a
#      devDependency at a real range (^0.1.0) — the optional peer alone is NOT
#      installed, so tsc can't resolve it standalone — AND must already be
#      published (topological order, one-time bootstrap).
#
# Deps are real ranges (no workspace:*), so `npm publish` ships them as-is — no
# workspace substitution needed.

name: release

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  CRATE: blackhole-engine-napi   # cargo -p target
  LIBBASE: blackhole_engine_napi # lib<LIBBASE>.so / .dylib / <LIBBASE>.dll
  NODENAME: index                # produced <NODENAME>.<suffix>.node

jobs:
  build:
    name: build ${{ matrix.suffix }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu, suffix: linux-x64-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, suffix: linux-arm64-gnu, cross: true }
          - { os: macos-13, target: x86_64-apple-darwin, suffix: darwin-x64 }
          - { os: macos-14, target: aarch64-apple-darwin, suffix: darwin-arm64 }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, suffix: win32-x64-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: aarch64 linker
        if: ${{ matrix.cross }}
        run: |
          sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"
      - run: cargo build --release -p ${{ env.CRATE }} --target ${{ matrix.target }}
      - name: assemble .node
        shell: bash
        run: |
          out="target/${{ matrix.target }}/release"
          dest="${{ env.NODENAME }}.${{ matrix.suffix }}.node"
          if   [ -f "$out/lib${{ env.LIBBASE }}.so" ];    then cp "$out/lib${{ env.LIBBASE }}.so"    "$dest"
          elif [ -f "$out/lib${{ env.LIBBASE }}.dylib" ]; then cp "$out/lib${{ env.LIBBASE }}.dylib" "$dest"
          elif [ -f "$out/${{ env.LIBBASE }}.dll" ];      then cp "$out/${{ env.LIBBASE }}.dll"      "$dest"
          else echo "::error::no cdylib in $out" && ls -la "$out" && exit 1; fi
      - uses: actions/upload-artifact@v4
        with:
          name: node-${{ matrix.suffix }}
          path: ${{ env.NODENAME }}.${{ matrix.suffix }}.node
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          pattern: node-*
          merge-multiple: true
      # Fetches typescript + any @c9up build devDeps (must be published first).
      - run: pnpm install --no-frozen-lockfile
      - run: pnpm build
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
